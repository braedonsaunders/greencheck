name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe what you'd like.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature or improvement would you like?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this solve? How would you use it?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work? (Optional)
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New language parser
        - Agent support
        - Reporting
        - Safety/guardrails
        - Configuration
        - Performance
        - Other
