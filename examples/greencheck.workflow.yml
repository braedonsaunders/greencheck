# greencheck — automatic CI failure fixer
# Copy this file to .github/workflows/greencheck.yml in your repository.
#
# Prerequisites:
#   1. Add your LLM API key (ANTHROPIC_API_KEY or OPENAI_API_KEY) to secrets.
#   2. Ensure your CI workflow name matches the "workflows" list below.
#   3. Add "workflow_dispatch:" to the watched CI workflow so greencheck can
#      trigger a follow-up run if a pushed fix does not automatically start Actions.

name: greencheck

on:
  workflow_run:
    # List the workflow names you want greencheck to monitor.
    # These must match the "name:" field in your CI workflow files.
    workflows: ["CI", "Tests", "Lint", "Build"]
    types: [completed]

permissions:
  actions: write       # Read logs and dispatch follow-up CI
  contents: write      # Push fix commits
  issues: write        # Post PR comments
  pull-requests: write # Post PR comments
  checks: read         # Read check suite status

jobs:
  fix:
    # Only trigger on failures — not success, cancelled, or skipped
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      # Check out the exact commit that failed
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      # Run greencheck with Claude Code
      - name: Run greencheck
        uses: braedonsaunders/greencheck@v0
        with:
          agent: claude
          agent-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          trigger-token: ${{ github.token }}
          max-passes: 5
          max-cost: "$3.00"
          timeout: 20m

      # Keep checkout credentials disabled so greencheck owns push auth.
